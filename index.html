<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VANTA · Link Hider</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-primary: #0b0b14;
            --bg-card: #13131f;
            --bg-input: #0f0f1a;
            --purple-primary: #8b5cf6;
            --purple-light: #a78bfa;
            --purple-dark: #2d1b4e;
            --text-primary: #f0eef8;
            --text-secondary: #b8b0d0;
            --text-muted: #6b6288;
            --border-color: #2a1f45;
            --border-light: rgba(139, 92, 246, 0.15);
            --radius: 16px;
            --radius-sm: 10px;
            --shadow-card: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 60px rgba(139, 92, 246, 0.05);
            --shadow-glow: 0 0 60px rgba(139, 92, 246, 0.08);
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 20px;
        }
        button {
            cursor: pointer;
            font-family: inherit;
            border: none;
            background: none;
            color: inherit;
        }
        input,
        select {
            font-family: inherit;
            border: none;
            outline: none;
            background: none;
            color: inherit;
        }
        a {
            text-decoration: none;
            color: inherit;
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }
        .glow-orb-1 {
            width: 500px;
            height: 500px;
            top: -200px;
            right: -100px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.12), transparent 70%);
            animation: floatOrb 20s ease-in-out infinite;
        }
        .glow-orb-2 {
            width: 400px;
            height: 400px;
            bottom: -150px;
            left: -100px;
            background: radial-gradient(circle, rgba(45, 27, 78, 0.2), transparent 70%);
            animation: floatOrb 25s ease-in-out infinite reverse;
        }
        @keyframes floatOrb {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -30px) scale(1.05);
            }
            66% {
                transform: translate(-20px, 20px) scale(0.95);
            }
        }

        .app {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 620px;
            padding: 10px 0;
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }
        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--purple-primary), #7c3aed);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.25);
        }
        .logo-text {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #fff 40%, var(--purple-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-badge {
            font-size: 11px;
            font-weight: 600;
            color: var(--purple-light);
            background: rgba(139, 92, 246, 0.12);
            padding: 2px 14px;
            border-radius: 50px;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        .header-sub {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .header-sub span {
            color: var(--purple-light);
            font-weight: 500;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 28px 24px;
            box-shadow: var(--shadow-card);
        }

        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
        }
        .form-group label i {
            color: var(--purple-primary);
            margin-right: 6px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 15px;
            color: var(--text-primary);
            transition: border 0.3s, box-shadow 0.3s;
            appearance: auto;
        }
        .form-group input::placeholder {
            color: var(--text-muted);
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--purple-primary);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.08);
        }
        .form-group select option {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .btn-shorten {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--purple-primary), #7c3aed);
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 15px;
            color: #fff;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-shorten:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 50px rgba(139, 92, 246, 0.25);
        }
        .btn-shorten:active {
            transform: scale(0.97);
        }
        .btn-shorten:disabled {
            opacity: 0.5;
            transform: none;
        }

        .output-wrapper {
            margin-top: 20px;
        }
        .output-area {
            padding: 16px 18px;
            background: var(--bg-input);
            border: 1px dashed var(--border-color);
            border-radius: var(--radius-sm);
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            transition: all 0.3s;
            word-break: break-all;
            position: relative;
        }
        .output-area.has-result {
            border-color: var(--purple-primary);
            border-style: solid;
            color: var(--text-primary);
            background: rgba(139, 92, 246, 0.04);
        }
        .output-area .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 6px 16px;
            background: var(--purple-primary);
            color: #fff;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
            opacity: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .output-area.has-result .copy-btn {
            opacity: 1;
            pointer-events: auto;
        }
        .output-area .copy-btn:hover {
            background: var(--purple-light);
            transform: scale(1.02);
        }
        .output-area .link-preview {
            display: block;
            font-size: 15px;
            color: var(--purple-light);
            word-break: break-all;
            text-decoration: underline;
            cursor: pointer;
        }
        .output-area .link-preview:hover {
            color: #fff;
        }

        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            margin-top: 10px;
        }
        .service-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 8px 6px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.3s;
            text-align: center;
            cursor: pointer;
        }
        .service-btn:hover {
            border-color: var(--purple-primary);
            background: rgba(139, 92, 246, 0.06);
            color: var(--text-primary);
        }
        .service-btn.active {
            border-color: var(--purple-primary);
            background: rgba(139, 92, 246, 0.1);
            color: var(--purple-light);
        }

        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
        }
        .footer-brand {
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--purple-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .error-message {
            color: #ef4444;
            font-weight: 500;
        }

        @media (max-width: 640px) {
            .app {
                padding: 0;
            }
            .card {
                padding: 20px 16px;
            }
            .logo-text {
                font-size: 22px;
            }
            .logo-icon {
                width: 38px;
                height: 38px;
                font-size: 18px;
            }
            .service-grid {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            }
            .service-btn {
                font-size: 10px;
                padding: 6px 4px;
            }
        }
    </style>
</head>
<body>

    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="app">
        <header class="header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                <span class="logo-text">VANTA</span>
                <span class="logo-badge">v2</span>
            </div>
            <p class="header-sub">
                <i class="fas fa-link" style="color:var(--purple-primary);"></i>
                Professional URL Shortening Service <span>⚡</span>
            </p>
        </header>

        <div class="card">

            <div class="form-group">
                <label><i class="fas fa-globe"></i> URL</label>
                <input type="text" id="urlInput" placeholder="https://example.com/very/long/url" autofocus />
            </div>

            <div class="form-group">
                <label><i class="fas fa-tag"></i> Service</label>
                <div class="service-grid" id="serviceGrid">
                    <button class="service-btn active" data-service="is.gd">is.gd</button>
                    <button class="service-btn" data-service="tinyurl">TinyURL</button>
                    <button class="service-btn" data-service="v.gd">v.gd</button>
                    <button class="service-btn" data-service="rebrandly">Rebrandly</button>
                    <button class="service-btn" data-service="cuttly">Cutt.ly</button>
                    <button class="service-btn" data-service="clickly">click.ly</button>
                    <button class="service-btn" data-service="tinycc">tiny.cc</button>
                    <button class="service-btn" data-service="shorterme">shorter.me</button>
                    <button class="service-btn" data-service="shortergg">shorter.gg</button>
                    <button class="service-btn" data-service="spoo.me">spoo.me</button>
                    <button class="service-btn" data-service="shorturlasia">shorturl.asia</button>
                    <button class="service-btn" data-service="reurlcc">reurl.cc</button>
                    <button class="service-btn" data-service="href.li">href.li</button>
                    <button class="service-btn" data-service="hyperhost">HyperHost</button>
                    <button class="service-btn" data-service="l8.nu">l8.nu</button>
                    <button class="service-btn" data-service="rb.gy">rb.gy</button>
                    <button class="service-btn" data-service="t2m.io">t2m.io</button>
                    <button class="service-btn" data-service="clck.ru">clck.ru</button>
                    <button class="service-btn" data-service="short.io">short.io</button>
                    <button class="service-btn" data-service="kurze.links">kurze.links</button>
                </div>
            </div>

            <button class="btn-shorten" id="shortenBtn">
                <i class="fas fa-scissors"></i> Shorten URL
            </button>

            <div class="output-wrapper">
                <div class="output-area" id="outputArea">
                    <span id="outputText">Your shortened link will appear here...</span>
                    <button class="copy-btn" id="copyBtn">
                        <i class="fas fa-copy"></i> Copy
                    </button>
                </div>
            </div>

        </div>

        <footer class="footer">
            <span class="footer-brand">VANTA</span>
            <span style="opacity:0.5;"> · &copy; 2026 · All rights reserved</span>
        </footer>
    </div>

    <script>
        (function() {
            'use strict';

            const urlInput = document.getElementById('urlInput');
            const shortenBtn = document.getElementById('shortenBtn');
            const outputArea = document.getElementById('outputArea');
            const outputText = document.getElementById('outputText');
            const copyBtn = document.getElementById('copyBtn');
            const serviceGrid = document.getElementById('serviceGrid');

            let selectedService = 'is.gd';

            // ─── SERVICE SELECTION ──────────────────────────────────────────
            serviceGrid.addEventListener('click', function(e) {
                const btn = e.target.closest('.service-btn');
                if (!btn) return;
                serviceGrid.querySelectorAll('.service-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedService = btn.dataset.service;
            });

            // ─── SHORTEN FUNCTION ──────────────────────────────────────────
            async function shortenUrl(url, service) {
                let cleanUrl = url.trim();
                if (!cleanUrl) return { error: 'Please enter a URL.' };
                if (!cleanUrl.startsWith('http://') && !cleanUrl.startsWith('https://')) {
                    cleanUrl = 'https://' + cleanUrl;
                }
                try {
                    new URL(cleanUrl);
                } catch (_) {
                    return { error: 'Invalid URL. Please enter a valid web address.' };
                }

                // API endpoints for each service
                const apis = {
                    'is.gd': {
                        url: 'https://is.gd/create.php',
                        method: 'GET',
                        params: { format: 'json', url: cleanUrl }
                    },
                    'v.gd': {
                        url: 'https://v.gd/create.php',
                        method: 'GET',
                        params: { format: 'json', url: cleanUrl }
                    },
                    'tinyurl': {
                        url: 'https://tinyurl.com/api-create.php',
                        method: 'GET',
                        params: { url: cleanUrl }
                    },
                    'rebrandly': {
                        url: 'https://api.rebrandly.com/v1/links',
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: { destination: cleanUrl, domain: { fullName: 'rebrand.ly' } }
                    }
                };

                const api = apis[service];
                if (!api) return { error: 'Service not supported yet.' };

                try {
                    let response;
                    if (api.method === 'GET') {
                        const params = new URLSearchParams(api.params);
                        response = await fetch(api.url + '?' + params.toString());
                    } else {
                        response = await fetch(api.url, {
                            method: api.method,
                            headers: api.headers || {},
                            body: JSON.stringify(api.body || {})
                        });
                    }

                    const data = await response.text();

                    // Parse response
                    let shortUrl = null;
                    if (service === 'is.gd' || service === 'v.gd') {
                        try {
                            const json = JSON.parse(data);
                            shortUrl = json.shorturl || json.url || null;
                        } catch (_) {
                            // Plain text response
                            if (data.startsWith('http')) shortUrl = data;
                        }
                    } else if (service === 'tinyurl') {
                        if (data.startsWith('http')) shortUrl = data;
                    } else if (service === 'rebrandly') {
                        try {
                            const json = JSON.parse(data);
                            shortUrl = json.shortUrl ? 'https://' + json.shortUrl : null;
                        } catch (_) {}
                    }

                    if (shortUrl) return { shortUrl: shortUrl };
                    return { error: 'Shortening failed. Please try again.' };

                } catch (_) {
                    return { error: 'Network error. Please check your internet connection.' };
                }
            }

            // ─── HANDLE SHORTEN ────────────────────────────────────────────
            async function handleShorten() {
                const url = urlInput.value;
                const originalText = shortenBtn.innerHTML;

                if (!url || url.trim() === '') {
                    outputText.innerHTML = '<span class="error-message">⚠️ Please enter a URL.</span>';
                    outputArea.classList.remove('has-result');
                    return;
                }

                shortenBtn.disabled = true;
                shortenBtn.innerHTML = '<span class="loading-spinner"></span> Shortening...';
                outputArea.classList.remove('has-result');
                outputText.textContent = '⏳ Shortening...';

                const result = await shortenUrl(url, selectedService);

                if (result.error) {
                    outputText.innerHTML = '<span class="error-message">⚠️ ' + result.error + '</span>';
                    shortenBtn.innerHTML = originalText;
                    shortenBtn.disabled = false;
                    return;
                }

                outputText.innerHTML = '<a href="' + result.shortUrl + '" target="_blank" class="link-preview">' + result
                    .shortUrl + '</a>';
                outputArea.classList.add('has-result');

                shortenBtn.innerHTML = originalText;
                shortenBtn.disabled = false;
            }

            shortenBtn.addEventListener('click', handleShorten);
            urlInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') handleShorten();
            });

            // ─── COPY ──────────────────────────────────────────────────────
            copyBtn.addEventListener('click', function() {
                const link = outputText.querySelector('a');
                if (link) {
                    navigator.clipboard.writeText(link.href).then(function() {
                        const original = copyBtn.innerHTML;
                        copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                        setTimeout(() => copyBtn.innerHTML = original, 2000);
                    }).catch(function() {
                        const range = document.createRange();
                        range.selectNode(link);
                        window.getSelection().removeAllRanges();
                        window.getSelection().addRange(range);
                        document.execCommand('copy');
                        window.getSelection().removeAllRanges();
                        const original = copyBtn.innerHTML;
                        copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                        setTimeout(() => copyBtn.innerHTML = original, 2000);
                    });
                }
            });

            console.log('%c⚡ VANTA Link Hider', 'font-size:20px; font-weight:bold; color:#8b5cf6;');
            console.log('%cProfessional URL Shortening Service', 'font-size:12px; color:#a78bfa;');

        })();
    </script>

</body>
</html>
