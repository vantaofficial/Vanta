<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VANTA · Discord Servers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0b0b14;
            --bg-card: #13131f;
            --bg-card-hover: #1a1a2e;
            --bg-input: #0f0f1a;
            --purple-primary: #8b5cf6;
            --purple-light: #a78bfa;
            --text-primary: #f0eef8;
            --text-secondary: #b8b0d0;
            --text-muted: #6b6288;
            --border-color: #2a1f45;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow-card: 0 8px 40px rgba(0,0,0,0.5), 0 0 60px rgba(139,92,246,0.05);
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }
        button { cursor: pointer; font-family: inherit; border: none; background: none; color: inherit; }
        input, select { font-family: inherit; border: none; outline: none; background: none; color: inherit; }
        a { text-decoration: none; color: inherit; }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }
        .glow-orb-1 {
            width: 500px; height: 500px;
            top: -200px; right: -100px;
            background: radial-gradient(circle, rgba(139,92,246,0.12), transparent 70%);
            animation: floatOrb 20s ease-in-out infinite;
        }
        .glow-orb-2 {
            width: 400px; height: 400px;
            bottom: -150px; left: -100px;
            background: radial-gradient(circle, rgba(45,27,78,0.2), transparent 70%);
            animation: floatOrb 25s ease-in-out infinite reverse;
        }
        @keyframes floatOrb {
            0%,100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(30px,-30px) scale(1.05); }
            66% { transform: translate(-20px,20px) scale(0.95); }
        }

        .app {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 620px;
        }

        .header { text-align: center; margin-bottom: 28px; }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }
        .logo-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--purple-primary), #7c3aed);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            box-shadow: 0 0 40px rgba(139,92,246,0.25);
        }
        .logo-text {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #fff 40%, var(--purple-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-badge {
            font-size: 11px;
            font-weight: 600;
            color: var(--purple-light);
            background: rgba(139,92,246,0.12);
            padding: 2px 14px;
            border-radius: 50px;
            border: 1px solid rgba(139,92,246,0.2);
        }
        .header-sub {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .header-sub span { color: var(--purple-light); font-weight: 500; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 24px 20px;
            box-shadow: var(--shadow-card);
        }

        .game-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }
        .game-btn {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .game-btn:hover {
            border-color: var(--purple-primary);
            background: rgba(139,92,246,0.06);
            color: var(--text-primary);
        }
        .game-btn .arrow {
            color: var(--text-muted);
            font-size: 13px;
            transition: 0.3s;
        }
        .game-btn.active .arrow { transform: rotate(90deg); color: var(--purple-light); }
        .game-btn.active { border-color: var(--purple-primary); background: rgba(139,92,246,0.06); }

        .servers-container {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin-top: 8px;
            padding-left: 4px;
            border-left: 2px solid rgba(139,92,246,0.15);
        }
        .servers-container.open { display: flex; }

        .server-link {
            background: rgba(255,255,255,0.015);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            text-decoration: none;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
        }
        .server-link:hover {
            border-color: var(--purple-primary);
            background: rgba(139,92,246,0.04);
            color: var(--text-primary);
        }
        .server-link .emoji { font-size: 16px; }
        .server-link .name { flex: 1; font-weight: 500; font-size: 14px; }
        .server-link .badge {
            font-size: 10px;
            color: var(--text-muted);
            background: rgba(255,255,255,0.04);
            padding: 2px 10px;
            border-radius: 20px;
        }
        .server-link .join { color: var(--text-muted); font-size: 13px; }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
        }
        .footer-brand {
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--purple-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media (max-width: 640px) {
            .app { padding: 0; }
            .card { padding: 18px 14px; }
            .logo-text { font-size: 22px; }
            .logo-icon { width: 38px; height: 38px; font-size: 18px; }
        }
    </style>
</head>
<body>

    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="app">
        <header class="header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                <span class="logo-text">VANTA</span>
                <span class="logo-badge">v2</span>
            </div>
            <p class="header-sub">
                <i class="fas fa-users" style="color:var(--purple-primary);"></i>
                Click a game to see <span>active Discord servers</span>
            </p>
        </header>

        <div class="card">
            <div class="game-grid" id="gameGrid"></div>
            <div id="serversContainer" class="servers-container"></div>
        </div>

        <footer class="footer">
            <span class="footer-brand">VANTA</span>
            <span style="opacity:0.5;"> · &copy; 2026 · All servers active</span>
        </footer>
    </div>

    <script>
        (function() {
            'use strict';

            const data = {
                adoptme: {
                    label: 'Adopt Me',
                    servers: [
                        'Official Adopt Me: https://discord.com/invite/adoptmeroblox',
                        'Adopt Me Trading Hub: https://discord.com/invite/adoptmetrading',
                        'Adopt Me Values: https://discord.com/invite/adoptmevalues'
                    ]
                },
                mm2: {
                    label: 'Murder Mystery 2',
                    servers: [
                        'MM2 Trading: https://discord.gg/mm2trading',
                        'MM2 Values: https://discord.gg/mm2values',
                        'MM2 Empire: https://discord.gg/mm2empire'
                    ]
                },
                bloxfruits: {
                    label: 'Blox Fruits',
                    servers: [
                        'Official Blox Fruits: https://discord.com/invite/bloxfruits',
                        'Blox Fruits Trading: https://discord.com/invite/bfcs',
                        'Blox Fruits Crew: https://discord.com/invite/bloxfruitscrew'
                    ]
                },
                ps99: {
                    label: 'Pet Simulator 99',
                    servers: [
                        'Official PS99: https://discord.com/invite/biggames',
                        'PS99 Trading: https://discord.com/invite/ps99trading',
                        'PS99 ScriptX: https://discordbotlist.com/servers/ps99-scriptx/join'
                    ]
                },
                fisch: {
                    label: 'Fisch',
                    servers: [
                        'Official Fisch: https://discord.com/invite/fischs',
                        'Fisch Trading: https://discord.com/invite/fischtrading',
                        'Fisch Community: https://discord.com/invite/fisch'
                    ]
                },
                stealabrainrot: {
                    label: 'Steal a Brainrot',
                    servers: [
                        'Official SAB: https://discord.com/invite/stealabrianrot',
                        'SAB Trading: https://discord.com/invite/stealabrainrott',
                        'SAB Community: https://discord.com/servers/steal-a-brainrot-trading-admin-abuse-notifier-1369618777368690729'
                    ]
                },
                growagarden: {
                    label: 'Grow a Garden',
                    servers: [
                        'Official Grow a Garden: https://discord.com/invite/growagarden',
                        'Grow a Garden Trading: https://discord.com/invite/stealabrainrott',
                        'Grow a Garden 2: https://discord.com/invite/growagarden2'
                    ]
                },
                rivals: {
                    label: 'Rivals',
                    servers: [
                        'Official Rivals: https://discord.com/invite/rivals',
                        'Marvel Rivals: https://discord.com/invite/marvelrivals',
                        'Rivals Farming: https://discord.com/servers/lord-farming-by-procarry-1337849959789105162'
                    ]
                },
                plsdonate: {
                    label: 'Pls Donate',
                    servers: [
                        'Official Pls Donate: https://discord.com/invite/plsdonate',
                        'Pls Donate News: https://discord.com/servers/pls-donate-news--1027373133113610330',
                        'Pls Donate Trading: https://discordbotlist.com/servers/the-donation-hub-983494809278889985/upvote'
                    ]
                },
                towerdefense: {
                    label: 'Tower Defense',
                    servers: [
                        'Official Terraria TD: https://discord.com/invite/terrariatowerdefense',
                        'Tower Defense Tides: https://discord.com/servers/tides-1390788122295664782',
                        'Tower Defense Community: https://discord.com/invite/sbtd'
                    ]
                },
                dahood: {
                    label: 'Da Hood',
                    servers: [
                        'Official Da Hood: https://discord.com/invite/dahood',
                        'Da Hood Trading: https://discord.gg/dahoodtrading',
                        'Da Hood EU: https://discord.com/servers/da-hood-eu-1217180054287810714'
                    ]
                },
                jailbreak: {
                    label: 'Jailbreak',
                    servers: [
                        'Official Jailbreak: https://discord.com/invite/jailbreak',
                        'Jailbreak Trading: https://discord.gg/jailbreak',
                        'Jailbreak Community: https://discord.com/servers/jailbreak-hybrid-24-7-trades-stock-updates-1277156827678638111'
                    ]
                },
                bladeball: {
                    label: 'Bladeball',
                    servers: [
                        'Official Bladeball: https://discord.com/invite/bladeball',
                        'Bladeball Trading: https://discord.gg/bladeball',
                        'Bladeball Community: https://discord.com/servers/blade-ball-1141515589924429869'
                    ]
                },
                deepwoken: {
                    label: 'Deepwoken',
                    servers: [
                        'Official Deepwoken: https://discord.com/invite/deepwoken',
                        'Deepwoken Trading: https://discord.com/invite/deepwoken-trading-hub-969040338373206026',
                        'Deepwoken Community: https://discordbotlist.com/servers/deepwoken/join'
                    ]
                }
            };

            const grid = document.getElementById('gameGrid');
            const container = document.getElementById('serversContainer');
            let activeGame = null;

            Object.keys(data).forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'game-btn';
                btn.innerHTML = `${data[key].label} <span class="arrow">▶</span>`;
                btn.dataset.game = key;

                btn.addEventListener('click', () => {
                    if (activeGame === key) {
                        container.classList.remove('open');
                        container.innerHTML = '';
                        activeGame = null;
                        document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active'));
                        return;
                    }
                    container.classList.remove('open');
                    container.innerHTML = '';
                    document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active'));

                    activeGame = key;
                    btn.classList.add('active');

                    const servers = data[key].servers;
                    servers.forEach(s => {
                        const parts = s.split(': ');
                        const name = parts[0];
                        const link = parts[1];

                        const a = document.createElement('a');
                        a.className = 'server-link';
                        a.href = link;
                        a.target = '_blank';
                        a.innerHTML = `
                            <span class="emoji">🔹</span>
                            <span class="name">${name}</span>
                            <span class="badge">Invite</span>
                            <span class="join">→</span>
                        `;
                        container.appendChild(a);
                    });

                    container.classList.add('open');
                });

                grid.appendChild(btn);
            });

            // Auto-open first game
            const firstKey = Object.keys(data)[0];
            const firstBtn = document.querySelector(`.game-btn[data-game="${firstKey}"]`);
            if (firstBtn) firstBtn.click();

            console.log('%c⚡ VANTA Servers', 'font-size:20px; font-weight:bold; color:#8b5cf6;');
        })();
    </script>

</body>
</html>
