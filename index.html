<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VANTA · Hyperlink Formatter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0b0b14;
            --bg-card: #13131f;
            --bg-input: #0f0f1a;
            --purple-primary: #8b5cf6;
            --purple-light: #a78bfa;
            --text-primary: #f0eef8;
            --text-secondary: #b8b0d0;
            --text-muted: #6b6288;
            --border-color: #2a1f45;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow-card: 0 8px 40px rgba(0,0,0,0.5), 0 0 60px rgba(139,92,246,0.05);
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }
        button { cursor: pointer; font-family: inherit; border: none; background: none; color: inherit; }
        input { font-family: inherit; border: none; outline: none; background: none; color: inherit; }
        a { text-decoration: none; color: inherit; }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }
        .glow-orb-1 {
            width: 500px; height: 500px;
            top: -200px; right: -100px;
            background: radial-gradient(circle, rgba(139,92,246,0.12), transparent 70%);
            animation: floatOrb 20s ease-in-out infinite;
        }
        .glow-orb-2 {
            width: 400px; height: 400px;
            bottom: -150px; left: -100px;
            background: radial-gradient(circle, rgba(45,27,78,0.2), transparent 70%);
            animation: floatOrb 25s ease-in-out infinite reverse;
        }
        @keyframes floatOrb {
            0%,100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(30px,-30px) scale(1.05); }
            66% { transform: translate(-20px,20px) scale(0.95); }
        }

        .app {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 580px;
            padding: 24px;
        }

        .header { text-align: center; margin-bottom: 28px; }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }
        .logo-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--purple-primary), #7c3aed);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            box-shadow: 0 0 40px rgba(139,92,246,0.25);
        }
        .logo-text {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #fff 40%, var(--purple-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-badge {
            font-size: 11px;
            font-weight: 600;
            color: var(--purple-light);
            background: rgba(139,92,246,0.12);
            padding: 2px 14px;
            border-radius: 50px;
            border: 1px solid rgba(139,92,246,0.2);
        }
        .header-sub {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .header-sub span { color: var(--purple-light); font-weight: 500; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 28px 24px;
            box-shadow: var(--shadow-card);
        }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
        }
        .form-group label i { color: var(--purple-primary); margin-right: 6px; }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 15px;
            color: var(--text-primary);
            transition: border 0.3s, box-shadow 0.3s;
        }
        .form-group input::placeholder { color: var(--text-muted); }
        .form-group input:focus {
            border-color: var(--purple-primary);
            box-shadow: 0 0 0 4px rgba(139,92,246,0.08);
        }

        .btn-format {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--purple-primary), #7c3aed);
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 15px;
            color: #fff;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(139,92,246,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-format:hover { transform: translateY(-2px); box-shadow: 0 0 50px rgba(139,92,246,0.25); }
        .btn-format:active { transform: scale(0.97); }

        .output-wrapper { margin-top: 20px; }
        .output-area {
            padding: 16px 18px;
            background: var(--bg-input);
            border: 1px dashed var(--border-color);
            border-radius: var(--radius-sm);
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            transition: all 0.3s;
            word-break: break-all;
            position: relative;
        }
        .output-area.has-result {
            border-color: var(--purple-primary);
            border-style: solid;
            color: var(--text-primary);
            background: rgba(139,92,246,0.04);
        }
        .output-area .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 6px 16px;
            background: var(--purple-primary);
            color: #fff;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
            opacity: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .output-area.has-result .copy-btn {
            opacity: 1;
            pointer-events: auto;
        }
        .output-area .copy-btn:hover { background: var(--purple-light); transform: scale(1.02); }
        .output-area .link-preview {
            display: block;
            font-size: 15px;
            color: var(--purple-light);
            word-break: break-all;
            text-decoration: underline;
            cursor: pointer;
        }
        .output-area .link-preview:hover { color: #fff; }

        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
        }
        .footer-brand {
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--purple-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .error-message { color: #ef4444; font-weight: 500; }

        @media (max-width: 640px) {
            .app { padding: 16px; }
            .card { padding: 20px 16px; }
            .logo-text { font-size: 22px; }
            .logo-icon { width: 38px; height: 38px; font-size: 18px; }
        }
    </style>
</head>
<body>

    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <div class="app">
        <header class="header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                <span class="logo-text">VANTA</span>
                <span class="logo-badge">v2</span>
            </div>
            <p class="header-sub">
                <i class="fas fa-link" style="color:var(--purple-primary);"></i>
                Format any URL into a <span>Discord-safe</span> hyperlink
            </p>
        </header>

        <div class="card">

            <div class="form-group">
                <label><i class="fas fa-globe"></i> Fake Roblox URL</label>
                <input type="text" id="fakeUrl" placeholder="https://www.roblox.com.ml/users/133223244381/profile" />
            </div>

            <div class="form-group">
                <label><i class="fas fa-link"></i> Shortened URL</label>
                <input type="text" id="shortUrl" placeholder="https://linkurl.pk/qxVK011T" />
            </div>

            <button class="btn-format" id="formatBtn">
                <i class="fas fa-magic"></i> FORMAT FOR DISCORD →
            </button>

            <div class="output-wrapper">
                <div class="output-area" id="outputArea">
                    <span id="outputText">Your formatted link will appear here...</span>
                    <button class="copy-btn" id="copyBtn">
                        <i class="fas fa-copy"></i> Copy
                    </button>
                </div>
            </div>

        </div>

        <footer class="footer">
            <span class="footer-brand">VANTA</span>
            <span style="opacity:0.5;"> · &copy; 2026 · All rights reserved</span>
        </footer>
    </div>

    <script>
        (function() {
            'use strict';

            const fakeUrlInput = document.getElementById('fakeUrl');
            const shortUrlInput = document.getElementById('shortUrl');
            const formatBtn = document.getElementById('formatBtn');
            const outputArea = document.getElementById('outputArea');
            const outputText = document.getElementById('outputText');
            const copyBtn = document.getElementById('copyBtn');

            function formatLink(fakeUrl, shortUrl) {
                let cleanFake = fakeUrl.trim();
                let cleanShort = shortUrl.trim();

                if (!cleanFake) return { error: 'Please enter a fake Roblox URL.' };
                if (!cleanShort) return { error: 'Please enter a shortened URL.' };

                if (!cleanFake.startsWith('http://') && !cleanFake.startsWith('https://')) {
                    cleanFake = 'https://' + cleanFake;
                }
                if (!cleanShort.startsWith('http://') && !cleanShort.startsWith('https://')) {
                    cleanShort = 'https://' + cleanShort;
                }

                try {
                    new URL(cleanFake);
                    new URL(cleanShort);
                } catch (_) {
                    return { error: 'Invalid URL. Please enter valid web addresses.' };
                }

                return { result: `[${cleanFake}](${cleanShort})` };
            }

            function handleFormat() {
                const fakeUrl = fakeUrlInput.value;
                const shortUrl = shortUrlInput.value;

                const result = formatLink(fakeUrl, shortUrl);

                if (result.error) {
                    outputText.innerHTML = '<span class="error-message">⚠️ ' + result.error + '</span>';
                    outputArea.classList.remove('has-result');
                    return;
                }

                outputText.innerHTML = result.result;
                outputArea.classList.add('has-result');
            }

            formatBtn.addEventListener('click', handleFormat);

            fakeUrlInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') handleFormat();
            });
            shortUrlInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') handleFormat();
            });

            copyBtn.addEventListener('click', function() {
                const text = outputText.textContent;
                if (text && !text.startsWith('Your formatted') && !text.startsWith('⚠️')) {
                    navigator.clipboard.writeText(text).then(function() {
                        const original = copyBtn.innerHTML;
                        copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                        setTimeout(() => copyBtn.innerHTML = original, 2000);
                    }).catch(function() {
                        const range = document.createRange();
                        range.selectNode(outputText);
                        window.getSelection().removeAllRanges();
                        window.getSelection().addRange(range);
                        document.execCommand('copy');
                        window.getSelection().removeAllRanges();
                        const original = copyBtn.innerHTML;
                        copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                        setTimeout(() => copyBtn.innerHTML = original, 2000);
                    });
                }
            });

            console.log('%c⚡ VANTA Hyperlink Formatter', 'font-size:20px; font-weight:bold; color:#8b5cf6;');
        })();
    </script>

</body>
</html>
